name: Marble Kernel Ronin

on:
  workflow_dispatch:
  push:
    branches:
      - melt-rebase

permissions:
  contents: write

env:
  KERNEL_REPO: https://github.com/Pzqqt/android_kernel_xiaomi_marble.git
  KERNEL_BRANCH: melt-rebase
  AK3_REPO: https://github.com/osm0sis/AnyKernel3.git
  SUSFS_BRANCH: gki-android12-5.10 # Ganti ke gki-android13-5.15 jika kernel Anda menggunakan versi 5.15

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout Workflow Repository
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update

          sudo apt-get install -y \
            bc \
            bison \
            build-essential \
            ccache \
            clang \
            curl \
            flex \
            gcc \
            git \
            libelf-dev \
            libssl-dev \
            lld \
            llvm \
            python3 \
            rsync \
            unzip \
            wget \
            zip

      - name: Configure CCache
        run: |
          ccache -M 10G
          ccache -s

      - name: Clone Kernel Source
        run: |
          git clone \
            --depth=1 \
            --branch=${KERNEL_BRANCH} \
            ${KERNEL_REPO} kernel

      - name: Show Repository Information
        run: |
          cd kernel

          echo "Current Branch:"
          git branch

          echo ""
          echo "Top Level:"
          ls -la

          echo ""
          echo "Available Defconfigs:"
          find arch/arm64/configs -type f | head -100 || true

      - name: Prepare Build Environment
        run: |
          mkdir -p kernel/out

      - name: Detect Defconfig
        id: defconfig
        run: |
          cd kernel

          DEFCONFIG=$(find arch/arm64/configs \
            -type f \
            | grep -Ei "marble|vendor" \
            | head -n 1)

          if [ -z "$DEFCONFIG" ]; then
            echo "No suitable defconfig found"
            exit 1
          fi

          DEFCONFIG_NAME=$(basename "$DEFCONFIG")

          echo "DEFCONFIG_NAME=$DEFCONFIG_NAME" >> $GITHUB_ENV

          echo "Using: $DEFCONFIG_NAME"

      - name: Setup KernelSU Next & SUSFS
        run: |
          cd kernel

          echo "--- Mengunduh dan Memasang KernelSU Next ---"
          curl -LSs "https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/main/kernel/setup.sh" | bash -

          echo "--- Mengunduh repositori SUSFS ---"
          git clone https://gitlab.com/simonpunk/susfs4ksu.git -b ${SUSFS_BRANCH} ../susfs

          echo "--- Menyalin file susfs ---"
          cp ../susfs/kernel_patches/fs/* fs/
          cp ../susfs/kernel_patches/include/linux/* include/linux/

          echo "--- Menerapkan Patch ke direktori KernelSU-Next ---"
          cd KernelSU-Next
          # Menambahkan parameter -f (force) agar terhindar dari prompt interaktif [y/n]
          # Menambahkan || true agar action tidak mati jika ada hunk patch yang sedikit berbeda dengan versi terbaru KSU
          if [ -f "../../susfs/kernel_patches/KernelSU-Next/10_enable_susfs_for_ksu.patch" ]; then
            patch -p1 -f < ../../susfs/kernel_patches/KernelSU-Next/10_enable_susfs_for_ksu.patch || true
          else
            patch -p1 -f < ../../susfs/kernel_patches/KernelSU/10_enable_susfs_for_ksu.patch || true
          fi
          cd ..

          echo "--- Menerapkan Patch ke Kernel source ---"
          patch -p1 -f < ../susfs/kernel_patches/50_add_susfs_in_gki-android12-5.10.patch || true

          echo "--- Mengaktifkan konfigurasi KSU Next dan SUSFS di defconfig ---"
          cat <<EOF >> arch/arm64/configs/${DEFCONFIG_NAME}

          # Konfigurasi KernelSU Next & SUSFS
          CONFIG_KSU=y
          CONFIG_KSU_SUSFS=y
          CONFIG_KSU_SUSFS_SUS_PATH=y
          CONFIG_KSU_SUSFS_SUS_MOUNT=y
          CONFIG_KSU_SUSFS_SUS_KSTAT=y
          CONFIG_KSU_SUSFS_SUS_OVERLAYFS=y
          CONFIG_KSU_SUSFS_TRY_UMOUNT=y
          CONFIG_KSU_SUSFS_SPOOF_UNAME=y
          CONFIG_KSU_SUSFS_ENABLE_LOG=y
          EOF

      - name: Build Kernel
        run: |
          cd kernel

          export ARCH=arm64
          export SUBARCH=arm64

          export LLVM=1
          export LLVM_IAS=1

          make O=out ${DEFCONFIG_NAME}

          make -j$(nproc) O=out

      - name: Locate Kernel Image
        run: |
          cd kernel

          IMAGE=$(find out \
            -type f \
            \( \
              -name "Image" -o \
              -name "Image.gz" -o \
              -name "Image.gz-dtb" \
            \) \
            | head -n 1)

          if [ -z "$IMAGE" ]; then
            echo "Kernel image not found"
            exit 1
          fi

          echo "IMAGE_PATH=$IMAGE" >> $GITHUB_ENV

          echo "Found image:"
          echo "$IMAGE"

      - name: Clone AnyKernel3
        run: |
          git clone \
            --depth=1 \
            ${AK3_REPO} \
            AnyKernel3

      - name: Copy Kernel Image
        run: |
          cp kernel/${IMAGE_PATH} AnyKernel3/

      - name: Remove Git Metadata
        run: |
          rm -rf AnyKernel3/.git

      - name: Generate Build Info
        run: |
          echo "Build Date: $(date)" > AnyKernel3/build-info.txt
          echo "Branch: ${KERNEL_BRANCH}" >> AnyKernel3/build-info.txt
          echo "Commit: ${GITHUB_SHA}" >> AnyKernel3/build-info.txt
          echo "Include: KernelSU Next + SUSFS" >> AnyKernel3/build-info.txt

      - name: Create Flashable ZIP
        run: |
          ZIP_NAME="Marble-Kernel-KSUNext-SUSFS-${GITHUB_RUN_NUMBER}.zip"

          cd AnyKernel3

          zip -r9 "../${ZIP_NAME}" .

          echo "ZIP_NAME=${ZIP_NAME}" >> $GITHUB_ENV

      - name: Upload ZIP Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Marble-Kernel-Ronin-KSUNext-SUSFS
          path: ${{ env.ZIP_NAME }}

      - name: Create Release Tag
        if: github.event_name == 'workflow_dispatch'
        run: |
          TAG="build-${GITHUB_RUN_NUMBER}-KSUNext"
          echo "TAG_NAME=${TAG}" >> $GITHUB_ENV

      - name: Create GitHub Release
        if: github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          name: Marble Kernel Ronin KSU-Next+SUSFS ${{ github.run_number }}
          files: ${{ env.ZIP_NAME }}
          generate_release_notes: true
          
