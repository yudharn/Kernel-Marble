name: Build Kernel Marble + ReSukiSU + SUSFS

on:
  workflow_dispatch: # Memicu build secara manual melalui tab Actions

env:
  # Konfigurasi Kernel
  KERNEL_REPO: https://github.com/Pzqqt/android_kernel_xiaomi_marble.git
  KERNEL_BRANCH: melt-rebase
  DEFCONFIG: vendor/marble_defconfig

  # Konfigurasi ReSukiSU & SUSFS
  # GANTI URL_RESUKISU_DISINI dengan link repository ReSukiSU yang Anda gunakan
  RESUKISU_REPO: https://github.com/ReSukiSU/ReSukiSU.git 
  RESUKISU_BRANCH: main
  SUSFS_REPO: https://gitlab.com/simonpunk/susfs4ksu.git
  SUSFS_BRANCH: gki-android12-5.10

jobs:
  build:
    name: Build Kernel ReSukiSU
    runs-on: ubuntu-22.04
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Build Environment
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential bc gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi libssl-dev libfl-dev curl wget cpio dkms flex bison libelf-dev python3 git lld file zip zstd

    - name: Clone Proton Clang Toolchain
      run: |
        echo "Mengunduh Toolchain..."
        git clone --depth=1 https://github.com/kdrag0n/proton-clang.git toolchain

    - name: Clone Kernel Source
      run: |
        echo "Mengunduh Source Kernel Marble..."
        git clone --depth=1 -b ${{ env.KERNEL_BRANCH }} ${{ env.KERNEL_REPO }} kernel

    - name: Clone ReSukiSU & SUSFS
      run: |
        cd kernel
        echo "Mengunduh ReSukiSU..."
        git clone --depth=1 -b ${{ env.RESUKISU_BRANCH }} ${{ env.RESUKISU_REPO }} KernelSU
        
        echo "Mengunduh SUSFS..."
        git clone --depth=1 -b ${{ env.SUSFS_BRANCH }} ${{ env.SUSFS_REPO }} susfs

    - name: Patch SUSFS ke Kernel & ReSukiSU
      run: |
        cd kernel
        
        # 1. Integrasi file header dan source SUSFS ke Kernel
        cp susfs/kernel_patches/fs/* fs/
        cp susfs/kernel_patches/include/linux/* include/linux/
        
        # 2. Patch Kernel utama
        echo "Menerapkan Patch SUSFS ke Kernel..."
        patch -p1 < susfs/kernel_patches/5.10/50_recipe_susfs.patch || echo "Peringatan: Ada konflik minor di Kernel, melanjutkan..."
        
        # 3. Patch ke direktori ReSukiSU
        echo "Menerapkan Patch SUSFS ke direktori ReSukiSU..."
        cd KernelSU
        # Parameter --forward digunakan agar workflow tidak gagal total (hunk failed) 
        # jika struktur ReSukiSU sedikit berbeda dari KernelSU standar.
        patch -p1 --forward < ../susfs/ksu_patches/KernelSU.patch || echo "Peringatan: Hunk failed pada ReSukiSU diabaikan. Pastikan ReSukiSU Anda kompatibel dengan patch ini."

    - name: Compile Kernel
      run: |
        cd kernel
        # Setup direktori Toolchain
        export PATH="$(pwd)/../toolchain/bin:$PATH"
        export ARCH=arm64
        export SUBARCH=arm64
        export KBUILD_BUILD_USER="Yudha"
        export KBUILD_BUILD_HOST="Github-Actions"
        
        # Konfigurasi Defconfig
        make O=out ARCH=arm64 ${{ env.DEFCONFIG }}
        
        # Proses Build
        echo "Memulai kompilasi kernel..."
        make -j$(nproc --all) O=out ARCH=arm64 CC=clang CROSS_COMPILE=aarch64-linux-gnu- CROSS_COMPILE_ARM32=arm-linux-gnueabi- LLVM=1 LLVM_IAS=1

    - name: Package ke AnyKernel3
      run: |
        echo "Membungkus kernel ke dalam Flashable Zip..."
        git clone --depth=1 https://github.com/osm0sis/AnyKernel3.git anykernel
        cd anykernel
        
        # Modifikasi AnyKernel3 agar kompatibel dengan POCO F5 (Marble)
        sed -i 's/device.name1=maguro/device.name1=marble/g' anykernel.sh
        sed -i 's/device.name2=toro/device.name2=poco f5/g' anykernel.sh
        sed -i 's/device.name3=mako/device.name3=pocof5/g' anykernel.sh
        
        # Copy file Image hasil build
        cp ../kernel/out/arch/arm64/boot/Image .
        
        # Compress menjadi zip
        zip -r9 AnyKernel3-Marble-ReSukiSU-SUSFS.zip * -x .git README.md *placeholder

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Flashable-Kernel-Marble-ReSukiSU
        path: anykernel/AnyKernel3-Marble-ReSukiSU-SUSFS.zip
        compression-level: 0 # Sudah dalam bentuk zip
        
