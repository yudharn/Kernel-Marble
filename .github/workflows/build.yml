name: Build Ronin Kernel GKI 12 (5.10) KSU + SUSFS (Taro)

on:
  workflow_dispatch:

jobs:
  build-kernel:
    runs-on: ubuntu-latest
    steps:
      # Langkah 1: Memaksimalkan penyimpanan server
      - name: Maximize Build Space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 2048
          swap-size-mb: 4096
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'
          remove-docker-images: 'true'

      # Langkah 2: Instalasi package pendukung di server
      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git curl make gcc clang bc libssl-dev flex bison libelf-dev lld python3 zip
          mkdir -p ~/bin
          curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
          chmod a+x ~/bin/repo
          echo "~/bin" >> $GITHUB_PATH

      # Langkah 3: Konfigurasi Git
      - name: Configure Git
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"

      # Langkah 4: Sinkronisasi Source Code Kernel GKI + Pembersihan .repo
      - name: Sync GKI Source
        run: |
          mkdir -p ${{ github.workspace }}/workspace
          cd ${{ github.workspace }}/workspace
          repo init -u https://android.googlesource.com/kernel/manifest -b common-android12-5.10 --depth=1
          repo sync -c -j$(nproc) --no-tags --no-clone-bundle
          
          echo "=== Ukuran penyimpanan SEBELUM menghapus .repo ==="
          df -h .
          rm -rf .repo
          echo "=== Ukuran penyimpanan SETELAH menghapus .repo ==="
          df -h .

      # Langkah 5: Memasang KernelSU Official & Checkout ke v0.9.5 (KUNCI PERBAIKAN)
      - name: Integrate Official KernelSU
        run: |
          cd ${{ github.workspace }}/workspace/common
          # Setup KernelSU dari branch main agar terinjeksi ke Makefile & Kconfig
          curl -LSs "https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh" | bash -
          
          # PENTING: Mundurkan source KernelSU ke v0.9.5 agar patch SUSFS bisa masuk
          cd KernelSU
          git fetch --tags
          git checkout v0.9.5
          echo "KernelSU berhasil di-checkout ke versi v0.9.5"

      # Langkah 6.1: Download SUSFS v2.1.0 Source (Khusus 5.10)
      - name: 📥 Clone SUSFS v2.1.0 Source
        run: |
          cd ${{ github.workspace }}
          git clone --depth=1 -b gki-android12-5.10 https://gitlab.com/simonpunk/susfs4ksu.git susfs4ksu

      # Langkah 6.2: Patch SUSFS ke KernelSU (Ditambah --fuzz=3)
      - name: 🛠️ Patch SUSFS ke KernelSU
        run: |
          cd ${{ github.workspace }}/workspace/common/KernelSU
          cp ${{ github.workspace }}/susfs4ksu/kernel_patches/KernelSU/10_enable_susfs_for_ksu.patch .
          
          # Menggunakan --fuzz=3 agar toleran terhadap offset baris kecil
          patch -p1 --fuzz=3 < 10_enable_susfs_for_ksu.patch || { 
            echo "❌ Gagal patch KernelSU!";
            echo "Log error (reject):";
            cat *.rej || true;
            exit 1; 
          }
          echo "✅ Patch KernelSU untuk SUSFS Berhasil!"

      # Langkah 6.3: Patch SUSFS ke Kernel 5.10
      - name: 🛠️ Patch SUSFS ke Kernel 5.10
        run: |
          cd ${{ github.workspace }}/workspace/common
          
          # Salin file inti SUSFS ke tree Kernel
          cp ${{ github.workspace }}/susfs4ksu/kernel_patches/fs/susfs.c fs/
          cp ${{ github.workspace }}/susfs4ksu/kernel_patches/include/linux/susfs.h include/linux/
          
          # Salin patch utama untuk Kernel 5.10
          PATCH_FILE="50_add_susfs_in_kernel-gki-android12-5.10.patch"
          cp "${{ github.workspace }}/susfs4ksu/kernel_patches/$PATCH_FILE" .
          
          # Eksekusi Patching
          patch -p1 --fuzz=3 < $PATCH_FILE || { echo "❌ Gagal patch Kernel Source 5.10"; exit 1; }
          echo "✅ Patching SUSFS v2.1.0 ke Kernel 5.10 Berhasil!"
          
      # Langkah 7: Modifikasi gki_defconfig (KSU, SUSFS & Identitas Taro)
      - name: Update Defconfig
        run: |
          cd ${{ github.workspace }}/workspace/common
          
          echo 'CONFIG_LOCALVERSION="-Ronin-Kernel-Taro"' >> arch/arm64/configs/gki_defconfig
          
          cat <<EOF >> arch/arm64/configs/gki_defconfig
          CONFIG_KSU=y
          CONFIG_KSU_SUSFS=y
          CONFIG_KSU_SUSFS_SUS_PATH=y
          CONFIG_KSU_SUSFS_SUS_MOUNT=y
          CONFIG_KSU_SUSFS_AUTO_ADD_SUS_KSU_DEFAULT_MOUNT=y
          CONFIG_KSU_SUSFS_AUTO_ADD_SUS_BIND_MOUNT=y
          CONFIG_KSU_SUSFS_SUS_KSTAT=y
          CONFIG_KSU_SUSFS_SUS_OVERLAYFS=y
          CONFIG_KSU_SUSFS_TRY_UMOUNT=y
          CONFIG_KSU_SUSFS_SPOOF_UNAME=y
          CONFIG_KSU_SUSFS_ENABLE_LOG=y
          EOF

      # Langkah 8: Proses Kompilasi Kernel GKI (Aarch64)
      - name: Build Kernel
        run: |
          cd ${{ github.workspace }}/workspace
          LTO=thin BUILD_CONFIG=common/build.config.gki.aarch64 build/build.sh

      # Langkah 9: Membungkus kernel menjadi Flashable Zip (Taro Configured)
      - name: Package AnyKernel3 (Flashable Zip)
        run: |
          cd ${{ github.workspace }}/workspace
          git clone https://github.com/osm0sis/AnyKernel3.git
          cd AnyKernel3
          rm -rf .git
          
          # Optimasi khusus perangkat berchipset Taro (SD 8 Gen 1)
          sed -i 's/kernel.string=.*/kernel.string=Ronin Kernel GKI 12 (Taro) KSU Official + SUSFS/g' anykernel.sh
          sed -i 's/device.name1=.*/device.name1=taro/g' anykernel.sh
          sed -i 's/device.name2=.*/device.name2=waipio/g' anykernel.sh
          sed -i 's/device.name3=.*/device.name3=cape/g' anykernel.sh
          sed -i 's/device.name4=.*/device.name4=diwali/g' anykernel.sh
          sed -i 's/block=.*/block=auto/g' anykernel.sh
          sed -i 's/is_slot_device=.*/is_slot_device=auto/g' anykernel.sh
          
          cp ../out/android12-5.10/dist/Image .
          zip -r9 "../Ronin-Kernel-Taro-GKI-12-5.10-KSU-SUSFS.zip" *

      # Langkah 10: Mengunggah hasil build
      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Ronin-Kernel-Taro-Android12-5.10
          path: |
            ${{ github.workspace }}/workspace/out/android12-5.10/dist/boot.img
            ${{ github.workspace }}/workspace/Ronin-Kernel-Taro-GKI-12-5.10-KSU-SUSFS.zip
